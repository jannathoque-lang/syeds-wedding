<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Syed’s Wedding</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400&display=swap');

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;

  /* YOUR BACKGROUND */
  background: linear-gradient(rgba(255,255,255,0.25), rgba(255,255,255,0.25)),
              url('AF4BEE5E-BE90-47C1-A640-6523658D66D4.png');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  color: #4a2c2a;
}

/* MAIN SECTION */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 30px 20px;
  text-align: center;
}

/* BISMILLAH */
.bismillah img {
  width: 240px;
  margin-bottom: 20px;
}

/* WELCOME TEXT */
.welcome {
  font-family: 'Great Vibes', cursive;
  font-size: 30px;
  color: #c9a24a;
  margin: 0;
}

/* NAMES */
.names {
  font-family: 'Playfair Display', serif;
  font-size: 34px;
  margin: 15px 0;
}

.amp {
  font-size: 32px;
  color: #c9a24a;
}

/* DATE */
.date {
  font-size: 12px;
  letter-spacing: 2px;
  color: #1f6b57;
  margin-top: 10px;
}

/* COUNTDOWN */
.countdown {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 25px;
}

.time-box {
  text-align: center;
}

.time-box span {
  display: block;
  font-size: 26px;
  font-weight: 600;
}

.time-box small {
  font-size: 10px;
  letter-spacing: 1px;
}

/* CEREMONY (NO BOX STYLE) */
.card {
  margin-top: 40px;
  text-align: center;
}

.card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
}

.card p {
  margin: 6px 0;
}

/* BUTTON */
.btn {
  margin-top: 15px;
  display: inline-block;
  padding: 10px 20px;
  border-radius: 30px;
  background: linear-gradient(45deg, #7a2d2d, #1f6b57);
  color: white;
  text-decoration: none;
  font-size: 14px;
}

/* MOBILE OPTIMISATION */
@media (max-width: 600px) {

  .bismillah img {
    width: 200px;
  }

  .welcome {
    font-size: 26px;
  }

  .names {
    font-size: 28px;
  }

  .amp {
    font-size: 28px;
  }

  .date {
    font-size: 11px;
  }

  .countdown {
    gap: 6px;
  }

  .time-box span {
    font-size: 22px;
  }

  .card h2 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <!-- BISMILLAH -->
  <div class="bismillah">
    <img src="IMG_1467.jpeg">
  </div>

  <!-- TEXT -->
  <h1 class="welcome">Welcome to Syed’s Wedding</h1>

  <div class="names">
    Syed Rakibul Hoque<br>
    <span class="amp">&</span><br>
    Minshana Muneer
  </div>

  <p class="date">SUNDAY 28TH JUNE 2026 • 6:00 PM</p>

  <!-- COUNTDOWN -->
  <div class="countdown">
    <div class="time-box"><span id="days">0</span><small>DAYS</small></div>
    <div class="time-box"><span id="hours">0</span><small>HOURS</small></div>
    <div class="time-box"><span id="minutes">0</span><small>MINUTES</small></div>
    <div class="time-box"><span id="seconds">0</span><small>SECONDS</small></div>
  </div>

  <!-- CEREMONY -->
  <div class="card">
    <h2>Wedding Ceremony</h2>
    <p><strong>Imperial Banqueting</strong></p>
    <p>619 High Road, London, E11 4PA</p>
    <a class="btn" href="https://maps.google.com" target="_blank">Open Map</a>
  </div>

</section>

<!-- COUNTDOWN SCRIPT -->
<script>
const targetDate = new Date("June 28, 2026 18:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const d = Math.floor(diff / (1000 * 60 * 60 * 24));
  const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const m = Math.floor((diff / (1000 * 60)) % 60);
  const s = Math.floor((diff / 1000) % 60);

  document.getElementById("days").innerText = d;
  document.getElementById("hours").innerText = h;
  document.getElementById("minutes").innerText = m;
  document.getElementById("seconds").innerText = s;

}, 1000);
</script>

</body>
</html>
